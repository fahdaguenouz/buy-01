<div *ngIf="isLoading" class="loading-state">
  <h3>Loading catalog...</h3>
</div>

<div *ngIf="!isLoading && products.length === 0" class="empty-state">
  <h3>No products found!</h3>
  <p>Check back later or register as a Seller to add some.</p>
</div>

<div class="product-grid" *ngIf="!isLoading && products.length > 0">
  <mat-card class="product-card" *ngFor="let product of products">

    <img mat-card-image
      [src]="product.mediaIds && product.mediaIds.length > 0 ? product.mediaIds[0] : '/images/product.jpeg'"
      [alt]="product.name" class="product-img">

    <mat-card-content>
      <div class="product-info">
        <h3 class="product-name">{{ product.name }}</h3>
        <p class="product-price">{{ product.price | currency }}</p>
      </div>
      <p class="product-description">{{ product.description }}</p>
    </mat-card-content>

    <mat-card-actions>
      <button mat-flat-button color="primary" class="full-width">VIEW DETAILS</button>
    </mat-card-actions>
  </mat-card>
</div>
