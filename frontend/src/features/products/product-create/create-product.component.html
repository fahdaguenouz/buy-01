<div class="product-container">
  <div class="form-card">
    <h2>{{ isEditMode ? 'Edit Product' : 'List a New Product' }}</h2>
    <form [formGroup]="productForm" (ngSubmit)="onSubmit()">

      <div class="form-grid">
        <div class="field">
          <label>Product Name</label>
          <input type="text" formControlName="name" placeholder="e.g. Vintage Camera">
          <small class="error" *ngIf="productForm.get('name')?.invalid && productForm.get('name')?.touched">
            Name must be at least 3 characters
          </small>
        </div>

        <div class="field">
          <label>Price ($)</label>
          <input type="number" formControlName="price" placeholder="0.00">
        </div>
      </div>

      <div class="field">
        <label>Stock Quantity</label>
        <input type="number" formControlName="stockQuantity" placeholder="1">
        <small class="error"
          *ngIf="productForm.get('stockQuantity')?.invalid && productForm.get('stockQuantity')?.touched">
          Stock must be at least 1
        </small>
      </div>

      <div class="field">
        <label>Category</label>
        <select formControlName="category">
          <option value="" disabled>Select a category</option>
          <option *ngFor="let cat of categories" [value]="cat.name">
            {{ cat.name }}
          </option>
        </select>
      </div>

      <div class="field">
        <label>Description</label>
        <textarea formControlName="description" rows="3"></textarea>
      </div>

      <div class="media-section">
        <label>Product Images (At least 1 required, Max 4)</label>

        <small class="error" *ngIf="previewUrls.length === 0">
          Please upload at least one image to proceed.
        </small>

        <div class="media-grid">
          <div *ngFor="let url of previewUrls; let i = index" class="media-item">
            <img [src]="url" alt="Preview" class="thumbnail-preview">
            <button type="button" class="remove-btn" (click)="removeMedia(i)">Remove</button>
          </div>
        </div>

        <input type="file" (change)="onFileSelected($event)" [disabled]="previewUrls.length >= 4">
      </div>

      <button type="submit" [disabled]="productForm.invalid" class="submit-btn">
        {{ isEditMode ? 'Update Product' : 'Create Product' }}
      </button>
    </form>
  </div>
</div>
