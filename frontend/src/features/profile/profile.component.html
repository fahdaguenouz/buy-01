<div class="profile-container">
    <mat-card class="profile-info-card">
        <div class="profile-header">
            <div class="avatar-display">
                <img [src]="user?.avatarMediaId || '/images/default-avatar.svg'" alt="Avatar">
            </div>
            <h2>{{ user?.firstName }} {{ user?.lastName }}</h2>
            <span class="role-chip">{{ user?.role }}</span>
        </div>

        <mat-divider></mat-divider>

        <div class="info-list">
            <div class="info-item">
                <mat-icon>alternate_email</mat-icon>
                <div>
                    <label>Username</label>
                    <p>{{ user?.username }}</p>
                </div>
            </div>
            <div class="info-item">
                <mat-icon>email</mat-icon>
                <div>
                    <label>Email</label>
                    <p>{{ user?.email }}</p>
                </div>
            </div>
        </div>

        <button mat-fab extended color="primary" class="edit-btn" (click)="openUpdateDialog()">
            <mat-icon>edit</mat-icon>
            Edit Profile
        </button>
    </mat-card>
</div>
