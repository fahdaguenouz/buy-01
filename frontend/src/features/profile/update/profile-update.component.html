<h2 mat-dialog-title>Update Profile</h2>

<mat-dialog-content>
  <div class="dialog-avatar-container">
    <div class="avatar-wrapper" (click)="fileInput.click()">
      <img [src]="avatarPreview" alt="Preview">
      <div class="overlay">
        <mat-icon>photo_camera</mat-icon>
      </div>
    </div>
    <input type="file" #fileInput hidden accept="image/*" (change)="onFileSelected($event)">
    <p class="hint">Click photo to change (Max 2MB)</p>
  </div>

  <form [formGroup]="updateForm" class="update-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>First Name</mat-label>
      <input matInput formControlName="firstName" placeholder="Optional">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Last Name</mat-label>
      <input matInput formControlName="lastName" placeholder="Optional">
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>CANCEL</button>
  <button mat-raised-button color="primary" 
          (click)="onSave()" 
          [disabled]="updateForm.invalid">
    SAVE CHANGES
  </button>
</mat-dialog-actions>
