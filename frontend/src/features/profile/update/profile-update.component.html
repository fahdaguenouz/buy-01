<h2 mat-dialog-title class="dialog-title">
  <mat-icon>edit</mat-icon>
  Edit Profile
</h2>

<mat-dialog-content>
  <div class="dialog-avatar-section">
    <div class="avatar-wrapper" (click)="fileInput.click()">
      <img [src]="avatarPreview" alt="Preview">
      <div class="overlay">
        <mat-icon>photo_camera</mat-icon>
        <span>Change Photo</span>
      </div>
    </div>
    <input type="file" #fileInput hidden accept="image/jpeg,image/png" (change)="onFileSelected($event)">
    <p class="avatar-hint">Click to upload new avatar (Max 2MB)</p>
  </div>

  <form [formGroup]="updateForm" class="update-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>First Name</mat-label>
      <input matInput formControlName="firstName" placeholder="Enter first name">
      <mat-icon matPrefix>person</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Last Name</mat-label>
      <input matInput formControlName="lastName" placeholder="Enter last name">
      <mat-icon matPrefix>person</mat-icon>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button mat-dialog-close class="cancel-btn">Cancel</button>
  <button 
    mat-raised-button 
    color="primary" 
    class="save-btn"
    (click)="onSave()" 
    [disabled]="updateForm.invalid || isUploading">
    <mat-icon *ngIf="isUploading" class="spin-icon">refresh</mat-icon>
    <span *ngIf="!isUploading">Save Changes</span>
  </button>
</mat-dialog-actions>
