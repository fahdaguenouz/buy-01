<mat-toolbar color="primary" class="navbar">
  <span class="logo" routerLink="/">01Buy</span>
  <span class="spacer"></span>
  

  <div *ngIf="isLoggedIn" class="user-section">
    <button mat-button *ngIf="role === 'SELLER'" routerLink="/seller-dashboard" class="add-btn">
      <mat-icon>add_circle</mat-icon>
      Dashboard
    </button>
    <button mat-button *ngIf="role === 'SELLER'" routerLink="/add-product" class="add-btn">
      <mat-icon>add_circle</mat-icon>
      Add Product
    </button>
    <span class="role-badge" [ngClass]="role?.toLowerCase()">{{ role }}</span>
    <span class="welcome-text">Hi, {{ username }}</span>

    <button mat-icon-button [matMenuTriggerFor]="menu">
      <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item routerLink="/profile">
        <mat-icon>person</mat-icon>
        <span>Profile</span>
      </button>
      <button mat-menu-item (click)="logout()">
        <mat-icon>exit_to_app</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </div>

  <div *ngIf="!isLoggedIn">
    <button mat-button routerLink="/login">Login</button>
    <button mat-raised-button color="accent" routerLink="/register">Register</button>
  </div>
</mat-toolbar>
