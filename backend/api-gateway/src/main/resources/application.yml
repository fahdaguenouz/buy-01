server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # --- 1. ACTUAL API ROUTES ---
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/auth/**,/users/**
          filters:
            - AuthenticationFilter

        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/products/**
          filters:
            - AuthenticationFilter

        - id: media-service
          uri: lb://MEDIA-SERVICE
          predicates:
            - Path=/api/media/**
          filters:
            - AuthenticationFilter

        # --- 2. SWAGGER UI VISUAL ROUTE ---
        # Forwards browser requests for the UI to the User Service
        - id: swagger-ui
          uri: lb://USER-SERVICE
          predicates:
            - Path=/swagger-ui.html, /swagger-ui/**, /v3/api-docs/swagger-config

        # --- 3. SWAGGER JSON DOC ROUTES ---
        # Fetches the actual API documentation data from each service
        - id: user-service-docs
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/v3/api-docs/**
          filters:
            - StripPrefix=1

        - id: product-service-docs
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/products/v3/api-docs/**
          filters:
            - StripPrefix=1

        - id: media-service-docs
          uri: lb://MEDIA-SERVICE
          predicates:
            - Path=/api/media/v3/api-docs/**
          filters:
            - StripPrefix=2

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

