server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux: # <-- THIS IS THE NEW REQUIRED LEVEL
          # ==========================================
          # Global CORS Configuration for Angular
          # ==========================================
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "http://localhost:4200" # Allow Angular to connect
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true

          # ==========================================
          # Microservice Routing Rules
          # ==========================================
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/auth/**, /users/**
              filters:
                - AuthenticationFilter 

            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/products/**
              filters:
                - AuthenticationFilter 
                
            - id: media-service
              uri: lb://media-service
              predicates:
                - Path=/api/media/**
              filters:
                - AuthenticationFilter 

# ==========================================
# Eureka Client Configuration
# ==========================================
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

